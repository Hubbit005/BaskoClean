<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Basko Clean — Profesjonalne czyszczenie B2B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html { margin: 0; scroll-behavior: smooth; }
  body {
    margin: 0;
    /* Ciemny granat jako baza całej strony. Wspólne paski/światło są na #root, a sekcje są przezroczyste — dzięki temu światło płynie między sekcjami bez „uciętych" linii na stykach. */
    background-color: var(--navy-900);
  }
  #root {
    /* overflow-x: clip (nie: hidden) — przycina poziome wystawanie chmur/bąbelków,
       ale NIE tworzy kontenera przewijania, więc sticky navbar dalej jedzie ze scrollem. */
    overflow-x: clip;
    background-color: var(--navy-900);
    /* JEDNO wspólne tło CAŁEJ strony — bez podziału na sekcje. Światło (poświaty) i paski są tutaj,
       a wszystkie sekcje są przezroczyste i tylko układają treść na wierzchu. Dzięki temu nie ma
       żadnych „przejść" ani uciętych linii — światło płynie nieprzerwanie od góry do dołu. */
    background-image:
      radial-gradient(70% 34% at 82% 12%, rgba(108,134,240,0.09) 0%, transparent 66%),
      radial-gradient(72% 34% at 14% 45%, rgba(108,134,240,0.08) 0%, transparent 66%),
      radial-gradient(72% 34% at 85% 82%, rgba(108,134,240,0.08) 0%, transparent 66%),
      repeating-linear-gradient(90deg, rgba(170,190,255,0.12) 0px, rgba(170,190,255,0.12) 1px, transparent 1px, transparent 58px);
  }

  /* Widoczny pierścień fokusa dla klawiatury (WCAG 2.4.7). Pokazywany tylko przy
     nawigacji klawiaturą (:focus-visible); klik myszką nie pokazuje obwódki. */
  :focus-visible {
    outline: 2px solid var(--accent-blue);
    outline-offset: 2px;
    border-radius: 3px;
  }
  :focus:not(:focus-visible) { outline: none; }

  /* Sekcje — semi-przezroczyste, obraz hali prześwituje */
  .scheme-1 { background: rgba(255, 255, 255, 0.94) !important; }
  .scheme-2 { background: rgba(14, 22, 42, 0.93) !important; }
  .scheme-3 { background: rgba(20, 30, 55, 0.93) !important; }

  /* Quote modal */
  .bc-overlay { position: fixed; inset: 0; background: rgba(4,6,8,.55); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 24px; }
  .bc-modal { background: #fff; border-radius: var(--radius-card); max-width: 460px; width: 100%; padding: 40px; }

  /* Scroll fade-in */
  .bc-fade { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
  .bc-fade.bc-visible { opacity: 1; transform: translateY(0); }

  /* Responsive */
  .bc-burger { display: none !important; }
  @media (max-width: 991px) {
    .bc-desktop-nav { display: none !important; }
    .bc-burger { display: flex !important; }
    .bc-hero-grid, .bc-svc-grid, .bc-cta-grid, .bc-footer-card, .bc-ofirmie-grid, .bc-uslugi-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .bc-benefits-grid { grid-template-columns: repeat(2,1fr) !important; }
    .bc-reviews-grid { grid-template-columns: 1fr !important; }
    .bc-footer-cols { grid-template-columns: repeat(2,1fr) !important; }
    .bc-footer-bottom { flex-direction: column !important; align-items: flex-start !important; gap: 20px; }
    .bc-sticky-desc { display: none !important; }
    .bc-hero-side { display: none !important; }
  }
  @media (max-width: 560px) {
    .bc-benefits-grid { grid-template-columns: 1fr !important; }
  }
  /* Pływające kafelki Hero (absolutne) nachodzą na kartę wyceny w oknie ~992–1180px — chowamy wcześniej. */
  @media (max-width: 1180px) {
    .bc-hero-side { display: none !important; }
  }
  @media (max-width: 700px) {
    .bc-expand-row { flex-direction: column !important; height: auto !important; gap: 10px !important; }
    .bc-expand-row > * { flex: 1 1 auto !important; min-height: 150px; }
  }

  /* Visually hidden but accessible to screen readers */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* Tytuł — statyczny gradient */
  .bc-gradient-text {
    background: linear-gradient(90deg, #0a0f1e 0%, #233562 40%, #4a6fa5 70%, #7b9fd4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
  }
  .bc-b2b {
    color: #4a6fa5;
  }

  /* Ozdobny napis tła (watermark) — domyślny rozmiar desktop. Na mobile mocno zmniejszony,
     by nie wychodził na treść / nie nachodził na nagłówki (sekcje i tak mają overflow:hidden). */
  .bc-watermark { font-size: clamp(5.5rem, 15vw, 13rem); }
  @media (max-width: 991px) {
    .bc-watermark { font-size: clamp(2.4rem, 11vw, 4rem) !important; }
  }

  /* Przycisk wyceny — gradientowe tło (połysk dokłada .bc-btn-shine) */
  .bc-quote-btn {
    width: 100%;
    margin-top: 4px;
    background: linear-gradient(135deg, #2d4470 0%, #233562 55%, #18233f 100%) !important;
    border: 1px solid rgba(255,255,255,0.14) !important;
    border-radius: 10px !important;
    box-shadow: 0 6px 22px rgba(35,53,98,0.32), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .bc-quote-btn:hover {
    box-shadow: 0 12px 34px rgba(35,53,98,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  /* Przechodzący połysk — na wszystkich przyciskach CTA */
  .bc-btn-shine { position: relative; overflow: hidden; }
  .bc-btn-shine::before {
    content: '';
    position: absolute;
    top: 0; left: -160%;
    width: 55%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.45), transparent);
    transform: skewX(-22deg);
    animation: bcShine 4.5s ease-in-out infinite;
    pointer-events: none;
  }
  .bc-btn-shine:hover::before { animation-duration: 3.5s; }
  /* na jasnych przyciskach (onDark = białe tło) — ciemniejszy błysk */
  .bc-btn-shine-dark::before {
    background: linear-gradient(100deg, transparent, rgba(27,42,74,0.28), transparent);
  }
  @keyframes bcShine {
    0%   { left: -160%; }
    16%  { left: 170%; }
    100% { left: 170%; }
  }

  /* Tekst z przepływającym gradientem (jak webuild.io) — w barwach Basko Clean */
  @keyframes bcTextFlow { to { background-position: 200% center; } }
  .bc-flow-text {
    background: linear-gradient(90deg, #4a6fa5, #8fa8ff, #cdd9ff, #8fa8ff, #4a6fa5);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: bcTextFlow 4s linear infinite;
    /* Wspólny lekki glow (jak na słowie „czysta") dla WSZYSTKICH tekstów z płynącym gradientem */
    filter: drop-shadow(0 0 14px rgba(143,168,255,0.6)) drop-shadow(0 0 28px rgba(143,168,255,0.35));
  }
  .bc-flow-text-dark {
    background: linear-gradient(90deg, #1b2a4a, #3b5bdb, #6c86f0, #3b5bdb, #1b2a4a);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: bcTextFlow 4.5s linear infinite;
  }
  /* Wspólny badge CTA → formularz wyceny (cyjan jak strona „Wycena", pulsująca poświata) */
  .bc-cta-badge {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%; flex-shrink: 0;
    background: radial-gradient(circle at 32% 28%, #7fe8ff 0%, #00c9f5 56%, #00a3cc 100%);
    border: 2px solid rgba(190,247,255,0.9);
    animation: bcCtaPulse 2.6s ease-in-out infinite;
  }
  @keyframes bcCtaPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(0,201,245,0.14), 0 8px 18px rgba(0,201,245,0.36), 0 0 16px rgba(0,201,245,0.45); }
    50%      { box-shadow: 0 0 0 7px rgba(0,201,245,0.22), 0 10px 24px rgba(0,201,245,0.50), 0 0 30px rgba(0,201,245,0.78); }
  }
  /* Ikona wypełniona płynącym gradientem (maska na kształt ikony) */
  .bc-flow-icon {
    width: 26px;
    height: 26px;
    background: linear-gradient(120deg, #233562, #4a6fa5, #8fa8ff, #4a6fa5, #233562);
    background-size: 220% auto;
    animation: bcTextFlow 4s linear infinite;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    -webkit-mask-size: contain; mask-size: contain;
  }

  /* Service picker tiles (formularz wyceny w Hero) */
  .bc-svc-caption {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg3);
    font-weight: 600;
  }
  .bc-svc-tile {
    position: relative;
    padding: 14px 8px 11px;
    border-radius: 12px;
    border: 1.5px solid var(--black-15);
    background: #fff;
    cursor: pointer;
    text-align: center;
    transition: border-color .25s, background .25s, transform .2s, box-shadow .25s;
  }
  .bc-svc-tile:hover {
    border-color: rgba(35,53,98,0.4);
    background: #f8fafc;
    transform: translateY(-2px);
  }
  .bc-svc-tile:focus-visible {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-light);
  }
  .bc-svc-tile.on {
    border-color: var(--cyan);
    background: var(--cyan-light);
    box-shadow: 0 6px 18px rgba(35,53,98,0.15);
  }
  .bc-svc-dot {
    position: absolute;
    top: 7px; right: 7px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0;
    transform: scale(0);
    transition: opacity .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .bc-svc-tile.on .bc-svc-dot { opacity: 1; transform: scale(1); }
  .bc-svc-tile svg {
    width: 26px; height: 26px;
    margin: 0 auto 8px;
    display: block;
  }
  .bc-svc-tile svg * {
    fill: none;
    stroke: var(--fg3);
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .25s;
  }
  .bc-svc-tile.on svg * { stroke: var(--cyan); }
  .bc-svc-txt {
    font-size: 11px;
    font-weight: 600;
    color: var(--fg2);
    line-height: 1.3;
    transition: color .25s;
  }
  .bc-svc-tile.on .bc-svc-txt { color: var(--cyan); }

  /* Karta wyceny — pływanie + płynący gradientowy border + szklane, podświetlone tło */
  .bc-card-glow {
    border-radius: 16px;
    padding: 2px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.22), 0 0 60px rgba(143,168,255,0.22);
    will-change: transform;
    backface-visibility: hidden;
    transform: translateZ(0);
    animation: bcCardFloat 6s ease-in-out infinite;
  }
  .bc-card-glow:hover { animation-play-state: paused; }
  @keyframes bcCardFloat {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50%      { transform: translate3d(0, -8px, 0); }
  }
  .bc-card-inner {
    background: #ffffff;
    border-radius: 14px;
    padding: 32px;
    text-align: center;
  }

  /* Pasek zaufania pod formularzem */
  .bc-trust-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--black-10);
  }
  .bc-trust-cell {
    text-align: center;
    padding: 0 4px;
    border-right: 1px solid var(--black-10);
  }
  .bc-trust-cell:last-child { border-right: none; }
  .bc-trust-val {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1.15rem;
    color: var(--cyan);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .bc-trust-lbl {
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--fg3);
    margin-top: 6px;
  }

  /* Sekcja O nas — interaktywne szklane karty */
  .bc-about-card {
    /* Mocno „szklane" (frosted): silny blur + bardzo niskie krycie tła + delikatna poświata akcentu.
       Tekst pozostaje czytelny dzięki jasnemu kolorowi na ciemnym, rozmytym tle. */
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(143,168,255,0.22);
    border-radius: 16px;
    padding: 22px;
    backdrop-filter: blur(22px) saturate(130%);
    -webkit-backdrop-filter: blur(22px) saturate(130%);
    box-shadow: 0 12px 36px rgba(5,10,40,0.30), 0 0 30px rgba(143,168,255,0.18);
    transition: transform .3s ease, background .3s ease, border-color .3s ease, box-shadow .3s ease;
  }
  .bc-about-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.07);
    border-color: rgba(143,168,255,0.6);
    box-shadow: 0 20px 44px rgba(5,10,40,0.5), 0 0 40px rgba(143,168,255,0.3);
  }
  .bc-about-ico {
    width: 44px; height: 44px; border-radius: 11px;
    background: rgba(143,168,255,0.16);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    transition: background .3s ease, transform .3s ease;
  }
  .bc-about-card:hover .bc-about-ico {
    background: rgba(143,168,255,0.32);
    transform: scale(1.06);
  }

  /* Miniatury karuzeli before/after */
  .bc-thumb {
    transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, opacity .25s ease;
  }
  .bc-thumb:hover { transform: translateY(-3px); }

  /* Połysk „wyczyszczonej szyby" — statyczny refleks na kafelkach */
  .bc-glass-shine { position: relative; }
  .bc-glass-shine::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(125deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 20%, rgba(255,255,255,0) 42%);
  }
  .bc-about-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(125deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 20%, rgba(255,255,255,0) 42%);
  }

  /* Deszcz baniek — bąbelki opadają w dół i delikatnie znikają na krańcach (płynna pętla) */
  @keyframes bcBubbleRain {
    0%   { transform: translateY(-12vh); opacity: 0; }
    12%  { opacity: var(--bub-o, 0.4); }
    86%  { opacity: var(--bub-o, 0.4); }
    100% { transform: translateY(82vh); opacity: 0; }
  }

  /* Bąbelki — stabilne, potem nagle PĘKAJĄ i odbudowują się (jak bańki mydlane) */
  @keyframes bcBubblePop {
    0%   { transform: scale(1);    opacity: var(--bub-o, 0.5); }
    80%  { transform: scale(1);    opacity: var(--bub-o, 0.5); }
    87%  { transform: scale(1.16); opacity: var(--bub-o, 0.5); }  /* napina się */
    92%  { transform: scale(1.55); opacity: 0; }                  /* PYK — strzela */
    93%  { transform: scale(0.15); opacity: 0; }                  /* zniknął */
    100% { transform: scale(1);    opacity: var(--bub-o, 0.5); }  /* odbudowa */
  }

  /* Płynący gradientowy border (jak webuild.io) — w barwach Basko */
  @keyframes bcBorderFlow { to { background-position: 300% 50%; } }
  @keyframes bcGalFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bcGalPop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .bc-flow-border { position: relative; }
  .bc-flow-border::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: linear-gradient(120deg, #233562, #4a6fa5, #8fa8ff, #cdd9ff, #8fa8ff, #4a6fa5, #233562);
    background-size: 300% 300%;
    animation: bcBorderFlow 7s linear infinite;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Pulsujący pierścień wokół medalionów z logo (TrustBar) — zachęca do kliknięcia */
  @keyframes bcPulseRing {
    0%   { transform: scale(1);    opacity: 0.65; }
    70%  { transform: scale(1.85); opacity: 0; }
    100% { transform: scale(1.85); opacity: 0; }
  }

  /* === FINAŁ STRONY (Podsumowanie + drugi CTA + stopka) === */

  /* Interaktywne bąbelki — reagują na kursor: napinają się i podświetlają (jak przed pęknięciem) */
  .bc-ibubble { pointer-events: auto; cursor: pointer; }
  .bc-ib-core {
    display: block;
    transform-origin: center;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), filter .35s ease;
  }
  .bc-ibubble:hover { z-index: 6; }
  .bc-ibubble:hover .bc-ib-core {
    transform: scale(1.75);
    filter: drop-shadow(0 0 10px var(--ib-glow, var(--accent-blue))) brightness(1.45);
  }

  /* Kafelek-filar w podsumowaniu — szklany, podświetla się na hover */
  .bc-sum-tile {
    position: relative;
    padding: 26px 24px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 10px 30px rgba(5,10,40,0.32);
    transition: transform .3s ease, background .3s ease, box-shadow .3s ease;
  }
  .bc-sum-tile:hover {
    transform: translateY(-6px);
    background: linear-gradient(100deg, rgba(143,168,255,0.16), rgba(143,168,255,0.03) 70%);
    box-shadow: 0 22px 50px rgba(5,10,40,0.5), 0 0 36px rgba(143,168,255,0.22);
  }

  /* Linki w stopce */
  .bc-foot-link { transition: color .2s ease; }
  .bc-foot-link:hover { color: #fff; }

  @media (max-width: 991px) {
    .bc-sum-grid   { grid-template-columns: repeat(2,1fr) !important; }
    .bc-sum-stats  { grid-template-columns: repeat(2,1fr) !important; }
    .bc-final-cta-inner { padding: 44px 26px !important; }
  }
  @media (max-width: 560px) {
    .bc-sum-grid    { grid-template-columns: 1fr !important; }
    .bc-foot-bar    { flex-direction: column; align-items: flex-start !important; }
    .bc-foot-bottom { flex-direction: column; align-items: flex-start !important; }
  }

  /* FIX 7: Respect user's motion preferences.
     WAŻNE: animation-iteration-count:1 jest kluczowe — bez tego animacje
     `infinite` skrócone do 0.01ms zapętlają się tysiące razy/s i komponent
     zaczyna gwałtownie wibrować zamiast się zatrzymać. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      animation-play-state: paused !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    .bc-fade { transition: none !important; }
    #bc-sticky-bar { transition: none !important; }
    /* karta wyceny: stoi nieruchomo zamiast pływać */
    .bc-card-glow { animation: none !important; transform: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Oferta.jsx"></script>
<script type="text/babel" src="TrustBar.jsx"></script>
<script type="text/babel" src="OFirmie.jsx"></script>
<script type="text/babel" src="Galeria.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="CTA.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const { useState } = React;

function QuoteModal({ onClose }) {
  const { t } = useLang();

   FINAŁ STRONY — Podsumowanie + drugi CTA + stopka
   Wszystko inline w index.html (komponenty .jsx zostają nietknięte).
   Korzysta z globalnych: makeBubbles, Foam, Button, Input (indirect eval).

const FINAL_ACCENT = BC_ACCENT;

// Mała bąbelkowa chmurka — dekoracyjny akcent (przezroczysty PNG), delikatnie pływa.
// Pozycję/rozmiar/opacity podajesz w `style`. Globalna, więc używają jej też Hero/TrustBar.
function Cloud({ src, style }) {
  return (
    <img src={src} alt="" aria-hidden="true"
      style={{
        position: "absolute", height: "auto", zIndex: 1, pointerEvents: "none", userSelect: "none",
        animation: "bcCardFloat 9s ease-in-out infinite", willChange: "transform",
        ...style,
      }} />
  );
}

// Bańka reagująca na kursor — opada (rain) + napina/podświetla się na hover
function InteractiveBubble({ b, accent }) {
  return (
    <span
      className="bc-ibubble"
      style={{
        position: "absolute", left: b.x + "%", top: b.y + "%",
        ["--bub-o"]: b.o, ["--ib-glow"]: accent,
        willChange: "transform, opacity",
        animation: `bcBubbleRain ${b.fall}s linear infinite`, animationDelay: b.delay + "s",
      }}
    >
      <span className="bc-ib-core">
        <svg width={b.s} height={b.s} viewBox="0 0 24 24" style={{ display: "block" }}>
          <circle cx="12" cy="12" r="11" fill={accent} opacity="0.07" />
          <circle cx="12" cy="12" r="9" fill={accent} opacity="0.13" />
          <circle cx="12" cy="12" r="9" fill="none" stroke={accent} strokeWidth="1.2" opacity="0.5" />
          <circle cx="8.4" cy="8.4" r="2.1" fill="#ffffff" opacity="0.6" />
        </svg>
      </span>
    </span>
  );
}

<script>
// Scroll fade-in via IntersectionObserver
setTimeout(function() {
  var sections = document.querySelectorAll('section');
  if (!sections.length) return;

  sections.forEach(function(s, i) { if (i > 0) s.classList.add('bc-fade'); });

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('bc-visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  sections.forEach(function(s) { obs.observe(s); });
}, 300);
</script>
